<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Evaluator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Web Evaluator</h1>
            <p>Analyze any web page for usability, performance, best practices, and security.</p>
        </header>

        <section class="controls">
            <div class="input-group">
                <label for="url">Target URL</label>
                <input type="url" id="url" placeholder="https://example.com" required>
            </div>

            <div class="input-group">
                <label for="model">Ollama Model</label>
                <select id="model">
                    <option value="">Loading models...</option>
                </select>
            </div>

            <div class="action-buttons">
                <button id="start-btn">Start Analysis</button>
                <button id="export-btn" disabled class="export-btn">Export
                    Results</button>
            </div>
        </section>

        <section id="screenshot-container" class="screenshot-container" style="display: none;">
            <h3>Page Preview</h3>
            <img id="screenshot-img" class="screenshot-thumbnail" alt="Page screenshot" />
        </section>

        <section id="scores-container" class="scores-container" style="display: none;">
            <div class="score-badge" id="badge-usability">Usability: <span class="score-val">-</span></div>
            <div class="score-badge" id="badge-performance">Performance: <span class="score-val">-</span></div>
            <div class="score-badge" id="badge-code">Code: <span class="score-val">-</span></div>
            <div class="score-badge" id="badge-security">Security: <span class="score-val">-</span></div>
        </section>

        <section class="results-grid">
            <div class="card" id="card-usability">
                <h2>Usability & Accessibility <span class="status-indicator"></span></h2>
                <div class="content" id="content-usability">Ready.</div>
            </div>
            <div class="card" id="card-performance">
                <h2>Page Performance <span class="status-indicator"></span></h2>
                <div class="content" id="content-performance">Ready.</div>
            </div>
            <div class="card" id="card-code">
                <h2>Code Best Practices <span class="status-indicator"></span></h2>
                <div class="content" id="content-code">Ready.</div>
            </div>
            <div class="card" id="card-security">
                <h2>Security Issues <span class="status-indicator"></span></h2>
                <div class="content" id="content-security">Ready.</div>
            </div>
        </section>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"
        integrity="sha384-cwS6YdhLI7XS60eoDiC+egV0qHp8zI+Cms46R0nbn8JrmoAzV9uFL60etMZhAnSu"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"
        integrity="sha384-zbcZAIxlvJtNE3Dp5nxLXdXtXyxwOdnILY1TDPVmKFhl4r4nSUG1r8bcFXGVa4Te"
        crossorigin="anonymous"></script>
    <div id="detail-modal" class="detail-modal" style="display: none;">
        <div class="detail-modal-content">
            <span id="detail-modal-close" class="detail-modal-close">&times;</span>
            <h2 id="detail-modal-title"></h2>
            <div id="detail-modal-body" class="detail-modal-body"></div>
        </div>
    </div>
    <div id="screenshot-modal" class="screenshot-modal" style="display: none;">
        <span id="screenshot-modal-close" class="screenshot-modal-close">&times;</span>
        <img id="screenshot-modal-img" class="screenshot-modal-img" alt="Page screenshot full size" />
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
